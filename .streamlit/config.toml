[theme]
base = "light"
primaryColor = "#2a9d45"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F6"
textColor = "#232329"
font = "\"Segoe UI\", system-ui, -apple-system, Roboto, Arial, sans-serif"

[server]
headless = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
