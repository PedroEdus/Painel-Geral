name: ETL Funil ClickMenos (incremental)

on:
  schedule:
    # 09:00 UTC = 06:00 BRT, diário. Watermark (MAX DataAlteracao) cobre
    # eventuais falhas: a próxima run recupera o período não carregado.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Recarga completa (WRITE_TRUNCATE) em vez de incremental"
        type: boolean
        default: false

concurrency:
  group: etl-funil-clickmenos
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Escrever credencial do BigQuery
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp_sa.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Rodar ETL
        env:
          CLICKMENOS_BASE_URL: ${{ secrets.CLICKMENOS_BASE_URL }}
          CLICKMENOS_LOGIN: ${{ secrets.CLICKMENOS_LOGIN }}
          CLICKMENOS_SENHA: ${{ secrets.CLICKMENOS_SENHA }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp_sa.json
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            python etl/funil_clickmenos.py --full
          else
            python etl/funil_clickmenos.py
          fi

      - name: Salvar erros (se houver)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: erros-clickmenos
          path: erros_clickmenos.json
          if-no-files-found: ignore
